name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, fix/*, feature/*, refactor/*, hotfix/*]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # SECURITY AUDIT — dependency vulnerability scan (non-blocking on PRs)
  # ===========================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory — don't block PRs yet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r src/backend/requirements.txt --desc
        continue-on-error: true

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit npm dependencies
        working-directory: src/frontend
        run: npm audit --omit=dev || true

  # ===========================================================================
  # MIGRATION VALIDATION — catch SQL syntax errors before merge
  # ===========================================================================
  migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U postgres && echo "PostgreSQL ready" && break
            echo "Waiting... ($i/30)"
            sleep 1
          done

      - name: Apply init scripts in lexical order
        run: |
          export PGPASSWORD=postgres
          find "$GITHUB_WORKSPACE/src/postgres-init" -maxdepth 1 -type f -name '*.sql' -print0 \
            | LC_ALL=C sort -z \
            | while IFS= read -r -d '' script; do
                echo "Applying: ${script#$GITHUB_WORKSPACE/}"
                psql -v ON_ERROR_STOP=1 -h localhost -p 5432 -U postgres -d wims_test \
                  -f "$script"
              done

      - name: Verify schema objects exist
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -p 5432 -U postgres -d wims_test -c "
            SELECT schemaname, tablename
            FROM pg_tables
            WHERE schemaname = 'wims'
            ORDER BY tablename;
          "

  # ===========================================================================
  # FRONTEND — lint, type-check, test, build
  # ===========================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_AUTH_API_URL: "http://localhost:8080/auth/realms/bfp"
          NEXT_PUBLIC_MAPBOX_TOKEN: ""
          NEXT_PUBLIC_BASE_URL: "http://localhost"

  # ===========================================================================
  # BACKEND — lint, format, test with full service stack
  # ===========================================================================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff pytest-cov
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U postgres && echo "PostgreSQL ready" && break
            echo "Waiting... ($i/30)"
            sleep 1
          done

      - name: Initialize test database
        run: |
          export PGPASSWORD=postgres
          find "$GITHUB_WORKSPACE/src/postgres-init" -maxdepth 1 -type f -name '*.sql' -print0 \
            | LC_ALL=C sort -z \
            | while IFS= read -r -d '' script; do
                echo "Applying: ${script#$GITHUB_WORKSPACE/}"
                psql -v ON_ERROR_STOP=1 -h localhost -p 5432 -U postgres -d wims_test \
                  -f "$script"
              done

      - name: Run tests
        run: pytest -v --tb=short --ignore=tests/test_rate_limiting.py --ignore=tests/test_suricata_ingestion.py --ignore=tests/test_infra_config.py --ignore=tests/integration/test_wims_initial_schema_bootstrap.py --ignore=tests/integration/test_auth_otp_policy.py --ignore=tests/integration/test_database_schema.py --ignore=tests/integration/test_rls_policy_enforcement.py --ignore=tests/integration/test_sql_quality_audit.py
        env:
          KEYCLOAK_REALM_URL: "http://localhost:8080/auth/realms/bfp"
          KEYCLOAK_CLIENT_ID: "bfp-client"
          KEYCLOAK_AUDIENCE: "account"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wims_test"
          REDIS_URL: "redis://localhost:6379/0"
          WIMS_MASTER_KEY: ${{ secrets.WIMS_MASTER_KEY }}

      - name: Coverage report
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=30 --ignore=tests/test_rate_limiting.py --ignore=tests/test_suricata_ingestion.py --ignore=tests/test_infra_config.py --ignore=tests/integration/test_wims_initial_schema_bootstrap.py --ignore=tests/integration/test_auth_otp_policy.py --ignore=tests/integration/test_database_schema.py --ignore=tests/integration/test_rls_policy_enforcement.py --ignore=tests/integration/test_sql_quality_audit.py
        env:
          KEYCLOAK_REALM_URL: "http://localhost:8080/auth/realms/bfp"
          KEYCLOAK_CLIENT_ID: "bfp-client"
          KEYCLOAK_AUDIENCE: "account"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wims_test"
          REDIS_URL: "redis://localhost:6379/0"
          WIMS_MASTER_KEY: ${{ secrets.WIMS_MASTER_KEY }}
        continue-on-error: true  # advisory until coverage is >30%

  # ===========================================================================
  # DOCKER BUILD — validate compose builds cleanly
  # ===========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Run on all PRs — Docker build is fast and catches broken Dockerfiles early

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker compose config
        working-directory: src
        run: docker compose config --quiet 2>/dev/null < /dev/null || docker compose -f docker-compose.yml config --quiet 2>/dev/null < /dev/null || echo "Config check skipped (no .env)"

      - name: Build images (no push)
        working-directory: src
        run: docker compose build --parallel

  # ===========================================================================
  # MERGE GATE — all critical jobs must pass
  # ===========================================================================
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [migrations, frontend, backend]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Migrations:  ${{ needs.migrations.result }}"
          echo "Frontend:    ${{ needs.frontend.result }}"
          echo "Backend:     ${{ needs.backend.result }}"
          if [[ "${{ needs.migrations.result }}" != "success" ]] || \
             [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.backend.result }}" != "success" ]]; then
            echo "One or more critical jobs failed. Merge blocked."
            exit 1
          fi
          echo "All critical jobs passed."
