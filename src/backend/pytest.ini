[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker definitions — enables `pytest -m unit`, `pytest -m integration`, etc.
markers =
    unit: Unit tests that do not require Docker services (postgres, redis, keycloak)
    integration: Integration tests requiring Docker services
    requires_keycloak: Tests that require Keycloak to be running
    requires_docker: Tests that require Docker containers to be running
    slow: Tests that take longer than 5 seconds

# Default options: verbose, short traceback, and skip infrastructure-heavy tests
# that require a fully bootstrapped Docker stack.
addopts =
    -v
    --tb=short
    --ignore=tests/test_rate_limiting.py
    --ignore=tests/test_suricata_ingestion.py
    --ignore=tests/test_infra_config.py
    --ignore=tests/integration/test_wims_initial_schema_bootstrap.py
    --ignore=tests/integration/test_auth_otp_policy.py
    --ignore=tests/integration/test_database_schema.py
    --ignore=tests/integration/test_rls_policy_enforcement.py
    --ignore=tests/integration/test_sql_quality_audit.py

# ===========================================================================
# Ignored test files and why:
#
# These files are integration-heavy and require Docker services (Keycloak,
# seeded postgres with migrations applied, Redis) to even collect without errors.
# They fail with ModuleNotFoundError (auth, main) outside Docker because they
# import app modules that require live infrastructure.
#
# To run them locally, use the Docker setup:
#   cd src && docker compose up -d
#   docker compose exec backend pytest tests/integration/test_backup_api.py -v
#
# To include them in CI, remove them from ignore and ensure the CI job starts
# Docker services before the pytest step (mimic the backend job in ci.yml).
# ===========================================================================
