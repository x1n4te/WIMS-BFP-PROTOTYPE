version: '3.8'

networks:
  wims_internal:
    driver: bridge
    name: wims_internal

services:
  # --- Infrastructure & Databases ---
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: wims-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wims
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - wims_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wims"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: wims-redis
    networks:
      - wims_internal
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: wims-keycloak
    command: start-dev --import-realm
    volumes:
      - ./keycloak/bfp-realm.json:/opt/keycloak/data/import/bfp-realm.json:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: secret
      KEYCLOAK_ADMIN: admin # <--- ADDED Bootstrap Admin
      KEYCLOAK_ADMIN_PASSWORD: admin # <--- ADDED Bootstrap Password
      KC_HTTP_RELATIVE_PATH: /auth # <--- ADDED to align with Nginx
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    networks:
      - wims_internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: wims-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - wims_internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4gb
    restart: always

  # --- Applications ---
  backend:
    build: ./backend
    container_name: wims-backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/wims
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - KEYCLOAK_REALM_URL=http://keycloak:8080/auth/realms/bfp
      - KEYCLOAK_CLIENT_ID=wims-web
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - incident_attachments_data:/app/storage
      - ./postgres-init:/app/postgres-init:ro
    networks:
      - wims_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
      ollama:
        condition: service_started

  celery-worker:
    build: ./backend
    container_name: wims-celery-worker
    command: celery -A main.celery_app worker --beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/wims
      - REDIS_URL=redis://redis:6379/0
      - KEYCLOAK_REALM_URL=http://keycloak:8080/auth/realms/bfp
      - OLLAMA_URL=http://ollama:11434
      - SURICATA_EVE_PATH=/var/log/suricata/eve.json
      - EXPORT_DIR=/app/storage/exports
    volumes:
      - ./suricata/logs:/var/log/suricata:ro
      - incident_attachments_data:/app/storage
    networks:
      - wims_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
        NEXT_PUBLIC_AUTH_API_URL: http://localhost/auth
        NEXT_PUBLIC_BASE_URL: http://localhost
        NEXT_PUBLIC_OIDC_REDIRECT_URI: http://localhost/callback
    container_name: wims-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_AUTH_API_URL=http://localhost/auth
      - NEXT_PUBLIC_BASE_URL=http://localhost
      - NEXT_PUBLIC_OIDC_REDIRECT_URI=http://localhost/callback
      - NEXT_PUBLIC_OIDC_AUTHORITY=http://localhost/auth/realms/bfp
      - NEXT_PUBLIC_OIDC_CLIENT_ID=wims-web
      - NEXT_PUBLIC_APP_URL=http://localhost
      - BACKEND_URL=http://backend:8000
    networks:
      - wims_internal
    depends_on:
      - backend

  wims-suricata:
    image: jasonish/suricata:latest
    container_name: wims-suricata
    restart: unless-stopped
    # In a real production environment, you use network_mode: "host"
    # For this Docker prototype, we will sniff the internal bridge network
    command: -i eth0
    volumes:
      - ./suricata/logs:/var/log/suricata
      - ./suricata/rules:/var/lib/suricata/rules
    networks:
      - wims_internal

  # --- Edge Gateway ---
  nginx-gateway:
    image: nginx:alpine
    container_name: wims-nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - wims_internal
    depends_on:
      - backend
      - frontend
      - keycloak

volumes:
  postgres_data:
  ollama_data:
  incident_attachments_data:
