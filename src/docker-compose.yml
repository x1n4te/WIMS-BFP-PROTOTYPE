networks:
  wims_internal:
    driver: bridge
    name: wims_internal

services:
  # --- Infrastructure & Databases ---
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: wims-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wims
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - wims_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wims"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2-alpine
    container_name: wims-redis
    networks:
      - wims_internal
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: wims-mailhog
    networks:
      - wims_internal
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: wims-keycloak
    command: start-dev --import-realm
    volumes:
      - ./keycloak/bfp-realm.json:/opt/keycloak/data/import/bfp-realm.json:ro
      - ./keycloak/themes/wims-bfp:/opt/keycloak/themes/wims-bfp:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY: "true"
    networks:
      - wims_internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL","exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/ HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 8 cat <&3 | head -1 | grep -qE '^HTTP'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: always
    ports:
      - "8080:8080"

  ollama:
    image: ollama/ollama:latest
    container_name: wims-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - wims_internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4gb
    restart: always

  # --- Applications ---
  backend:
    build: ./backend
    container_name: wims-backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/wims
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - KEYCLOAK_REALM_URL=http://keycloak:8080/auth/realms/bfp
      - KEYCLOAK_ISSUER=http://localhost/auth/realms/bfp
      - KEYCLOAK_CLIENT_ID=wims-web
      - KEYCLOAK_AUDIENCE=wims-web
      - KEYCLOAK_ADMIN_CLIENT_ID=${KEYCLOAK_ADMIN_CLIENT_ID:-}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      - KEYCLOAK_ADMIN_USER=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - incident_attachments_data:/app/storage
      - ./postgres-init:/app/postgres-init:ro
    networks:
      - wims_internal
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      ollama:
        condition: service_started

  celery-worker:
    build: ./backend
    container_name: wims-celery-worker
    command: celery -A main.celery_app worker --beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/wims
      - REDIS_URL=redis://redis:6379/0
      - KEYCLOAK_REALM_URL=http://keycloak:8080/auth/realms/bfp
      - OLLAMA_URL=http://ollama:11434
      - SURICATA_EVE_PATH=/var/log/suricata/eve.json
      - EXPORT_DIR=/app/storage/exports
    volumes:
      - ./suricata/logs:/var/log/suricata:ro
      - incident_attachments_data:/app/storage
    networks:
      - wims_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
        NEXT_PUBLIC_AUTH_API_URL: http://localhost:8080/auth
        NEXT_PUBLIC_BASE_URL: http://localhost
        NEXT_PUBLIC_OIDC_REDIRECT_URI: http://localhost/callback
        NEXT_PUBLIC_OIDC_AUTHORITY: http://localhost:8080/auth/realms/bfp
    container_name: wims-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_AUTH_API_URL=http://localhost:8080/auth
      - NEXT_PUBLIC_BASE_URL=http://localhost
      - NEXT_PUBLIC_OIDC_REDIRECT_URI=http://localhost/callback
      - NEXT_PUBLIC_OIDC_AUTHORITY=http://localhost:8080/auth/realms/bfp
      - NEXT_PUBLIC_OIDC_CLIENT_ID=wims-web
      - NEXT_PUBLIC_APP_URL=http://localhost
      - BACKEND_URL=http://nginx-gateway:80
    networks:
      - wims_internal
    depends_on:
      - backend

  wims-suricata:
    image: jasonish/suricata:latest
    container_name: wims-suricata
    restart: unless-stopped
    # In a real production environment, you use network_mode: "host"
    # For this Docker prototype, we will sniff the internal bridge network
    command: -i eth0
    volumes:
      - ./suricata/logs:/var/log/suricata
      - ./suricata/rules:/var/lib/suricata/rules
    networks:
      - wims_internal

  # --- Edge Gateway ---
  nginx-gateway:
    image: nginx:alpine
    container_name: wims-nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - wims_internal
    depends_on:
      - backend
      - frontend
      - keycloak

volumes:
  postgres_data:
  ollama_data:
  incident_attachments_data:
