events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;
    server {
        listen 80;
        listen [::]:80;

        # Use Docker's embedded DNS resolver with a short TTL so nginx re-resolves
        # upstream hostnames on every request. Without this, nginx caches the IP
        # at startup time — if any upstream container restarts and gets a new IP,
        # all traffic to that upstream returns 502 until nginx is also restarted.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # In a real scenario, you'd add SSL config for 443 here
        # listen 443 ssl;
        # listen [::]:443 ssl;

        # Auth routes (session, callback, logout) handled by Next.js frontend
        location /api/auth/ {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_headers on;
        }

        location /api/ {
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Rewrite Domain=nginx-gateway set by backend → Domain=localhost so
            # the browser accepts the cookie when accessing via http://localhost.
            proxy_cookie_domain nginx-gateway localhost;
            # CORS headers — backend does not add them, so nginx provides them.
            # Allow requests from the browser on any port during development.
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Cookie' always;

            # Handle OPTIONS preflight directly — do not proxy to backend.
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Cookie' always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        location /auth/ {
            set $upstream_keycloak http://keycloak:8080;
            proxy_pass $upstream_keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location / {
            set $upstream_frontend2 http://frontend:3000;
            proxy_pass $upstream_frontend2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
